services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/infrastructure.db
    volumes:
      - ./data:/data

  frontend:
    build:
      context: ./src/Frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
